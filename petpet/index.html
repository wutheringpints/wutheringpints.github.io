        <!-- Mobile/responsive scaling for GameMaker canvas -->
        <script>
            const GAME_W = 970;
            const GAME_H = 652;

            function scaleCanvas() {
                const canvas = document.getElementById('canvas');
                if (!canvas) return;
                const scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
                canvas.style.width  = Math.floor(GAME_W * scale) + 'px';
                canvas.style.height = Math.floor(GAME_H * scale) + 'px';
            }

            window.addEventListener('resize', scaleCanvas);

            // Let GM initialise first, then scale
            window.onload = function() {
                if (typeof GameMaker_Init === 'function') GameMaker_Init();
                setTimeout(scaleCanvas, 100);
            };
        </script>
